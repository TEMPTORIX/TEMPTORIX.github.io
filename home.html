<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GetAllMyLinks - 🍬MICHU🍬</title>
  <link rel="stylesheet" href="styles.css">
  <script defer src="script.js"></script>
  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="favicon.jpg">
  <!-- FontAwesome para los íconos -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <div class="container">
    <!-- Background Image -->
    <div class="background">
      <img src="./portada.jpg" alt="Background Image" class="background-image">
    </div>
    <!-- Profile Section -->
    <div class="profile-section">
      <!-- Redirección a Instagram desde la imagen de perfil -->
      <a href="https://www.instagram.com/TEMPTORIX_OFFICIAL" target="_blank">
        <img src="./perfil.jpg" alt="Profile Image" class="profile-image">
      </a>
      <h1 class="username">🍬TEMPTORIX🍬</h1>
      <p class="subtext">EN TELEGRAM TE ESPERA UN REGALO</p>
    </div>
    <!-- Buttons -->
    <div class="buttons">
      <a href="https://t.me/TEMPTORIX" class="button onlyfans-button">
        <i class="fab fa-telegram"></i> TELEGRAM
      </a>
      <a href="https://wa.me/12053962166" class="button telegram-button">
        <i class="fab fa-whatsapp"></i> WHATSAPP
      </a>
    </div>
    <!-- Countdown Timer -->
    <div class="countdown-section">
      <p class="countdown-label">80% ENDS IN</p>
      <div class="countdown-timer">
        <div class="time-box">
          <span id="hours">00</span>
          <p>HRS</p>
        </div>
        <div class="time-box">
          <span id="minutes">22</span>
          <p>MINS</p>
        </div>
        <div class="time-box">
          <span id="seconds">07</span>
          <p>SECS</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
